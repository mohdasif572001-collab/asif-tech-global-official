<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Mohd Asif</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-decor">
        <div class="shape circle-1"></div>
        <div class="shape circle-2" style="background: #00ffaa; right: -5%; bottom: -5%;"></div>
    </div>

    <main class="glass-container" style="max-width: 900px; text-align: center; padding: 100px 50px; border: 1px solid rgba(255,255,255,0.1);">
        
        <div style="margin-bottom: 20px;">
            <span class="badge" style="letter-spacing: 3px; color: #00ffaa; border-color: rgba(0,255,170,0.3); background: rgba(0,255,170,0.05);">
                FINISH PRESENTATION
            </span>
        </div>

        <h1 class="thank-you-title">Thank You</h1>
        
        <p style="color: #94a3b8; font-size: 1.3rem; font-weight: 300; margin-bottom: 50px; line-height: 1.6;">
            For your valuable time and attention. <br>
            It was a pleasure sharing these <span style="color: #f8fafc; font-weight: 500;">research insights</span> with you.
        </p>

        <div class="presenter-box">
            <div style="font-family: monospace; color: #64748b; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 8px;">PRESENTED BY</div>
            <div style="font-size: 2.2rem; font-weight: 800; color: #ffffff; letter-spacing: 1px;">MOHD ASIF</div>
            <div style="color: #00ffaa; font-size: 1rem; margin-top: 5px; font-family: monospace;">MBA 1ST YEAR // 2026</div>
        </div>

        <footer style="margin-top: 60px;">
            <button class="next-btn" onclick="window.location.href='index.html'" style="padding: 12px 35px; border-radius: 50px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
                ← BACK TO START
            </button>
        </footer>
    </main>

    <style>
        .thank-you-title {
            font-size: 7rem; /* Extra Large for impact */
            font-weight: 900;
            margin: 10px 0;
            background: linear-gradient(to bottom, #ffffff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -3px;
        }

        .presenter-box {
            display: inline-block;
            padding: 30px 60px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        .badge {
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid;
        }

        /* Responsive Fix for Mobile */
        @media (max-width: 768px) {
            .thank-you-title { font-size: 4rem; }
            .presenter-box { padding: 20px 40px; }
        }
    </style>
</body>
</html>
