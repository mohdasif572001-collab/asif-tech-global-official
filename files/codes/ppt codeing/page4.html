<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Other Issues - Mohd Asif</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-decor">
        <div class="shape circle-1"></div>
        <div class="shape circle-3"></div>
    </div>

    <main class="glass-container" style="max-width: 1000px; max-height: 95vh; padding: 30px 50px;">
        <header style="margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; display: flex; justify-content: space-between;">
            <div>
                <span class="badge" style="color: #ffaa00; border-color: #ffaa00;">Part 2 Analysis</span>
                <h1 style="font-size: 2.5rem; margin-top: 5px;">Other Issues</h1>
            </div>
            <div style="color: rgba(255, 255, 255, 0.2); font-family: monospace;">04 / 10</div>
        </header>
        
        <section class="content">
            <div style="display: flex; flex-direction: column; gap: 15px;">
                
                <div class="issue-item">
                    <div class="indicator"></div>
                    <div class="text-group">
                        <h3>Resistance to Change-</h3>
                        <p>Employees may resist learning new skills or methods</p>
                    </div>
                </div>

                <div class="issue-item">
                    <div class="indicator"></div>
                    <div class="text-group">
                        <h3>Lack of Evaluation-</h3>
                        <p>Companies may not properly evaluate training effectiveness</p>
                    </div>
                </div>

                <div class="issue-item">
                    <div class="indicator"></div>
                    <div class="text-group">
                        <h3>Transfer of Training Problem-</h3>
                        <p>Employees may not apply what they learned in real work</p>
                    </div>
                </div>

            </div>
        </section>

        <footer style="margin-top: 35px; display: flex; justify-content: space-between; align-items: center;">
            <button class="next-btn" onclick="window.location.href='page3.html'" style="padding: 8px 20px; font-size: 0.8rem; opacity: 0.7;">
                ← Previous
            </button>
            <div style="font-family: monospace; color: rgba(255,255,255,0.1); font-size: 0.8rem;">MOHD ASIF // 04</div>
            <button class="next-btn" onclick="window.location.href='page5.html'">
                Next Analysis →
            </button>
        </footer>
    </main>

    <style>
        .issue-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 15px 25px; /* Vertical padding kam kar di */
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .issue-item:hover {
            background: rgba(255, 170, 0, 0.05);
            border-color: rgba(255, 170, 0, 0.4);
            transform: translateX(10px);
        }

        .indicator {
            width: 3px;
            height: 35px;
            background: rgba(255, 255, 255, 0.1);
            margin-right: 20px;
            border-radius: 2px;
            transition: 0.3s;
        }

        .issue-item:hover .indicator {
            background: #ffaa00;
        }

        .text-group h3 {
            color: #f8fafc;
            font-size: 1.4rem; /* Font size balance kiya */
            margin-bottom: 2px;
        }

        .text-group p {
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 300;
        }
    </style>
</body>
</html>
