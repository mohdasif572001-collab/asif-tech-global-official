<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asif Tech Global | Professional LMS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="logo"><strong>ASIF TECH</strong> GLOBAL</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#courses">Courses</a>
            <a href="#videos">Videos</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Master Advanced Scripting & Tech</h1>
        <p>Expert Level Training for Next-Gen Developers</p>
    </section>

    <div class="container" style="max-width: 1200px; margin: auto; padding: 0 20px;">
        
        <div id="courses" class="category-grid">
            <div class="cat-card"><i class="fas fa-graduation-cap"></i><h3>All Courses</h3></div>
            <div class="cat-card"><i class="fas fa-book-open"></i><h3>Extra Topics</h3></div>
            <div class="cat-card"><i class="fas fa-microchip"></i><h3>Automation</h3></div>
            <div class="cat-card"><i class="fas fa-file-alt"></i><h3>Notes & PDFs</h3></div>
        </div>

        <div id="videos" class="video-section">
            <h2 style="text-align: center; color: var(--primary); font-size: 2rem;">Watch YouTube Videos</h2>
            
            <h3 style="border-left: 5px solid var(--primary); padding-left: 10px;">Latest Tutorials</h3>
            <div id="tutorial-grid" class="skills-grid"></div>

            <h3 style="border-left: 5px solid var(--accent); padding-left: 10px; margin-top: 40px;">Short Lessons</h3>
            <div id="shorts-grid" class="skills-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));"></div>
        </div>

    </div>

    <footer style="background: #222; color: white; text-align: center; padding: 50px 0; margin-top: 100px;">
        <p>&copy; 2026 Asif Tech Global Official</p>
    </footer>
   <script src="videos.js"></script>

    <script>
        // Theme toggle function
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }

        // 2. Video HTML banane ka function
        function createVideoHTML(id) {
            return `
                <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background:#000; margin-bottom:15px;">
                    <iframe src="https://www.youtube.com/embed/${id}" 
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" 
                            allowfullscreen>
                    </iframe>
                </div>`;
        }

        // 3. Videos load karne ka logic
        window.onload = function() {
            // Check karein ki myContent (videos.js se) mil raha hai ya nahi
            if (typeof myContent !== 'undefined') {
                const tutGrid = document.getElementById('tutorial-grid');
                const shortGrid = document.getElementById('shorts-grid');

                // Tutorials load karein
                if (tutGrid && myContent.tutorials) {
                    myContent.tutorials.forEach(id => {
                        tutGrid.innerHTML += createVideoHTML(id);
                    });
                }

                // Shorts load karein
                if (shortGrid && myContent.shorts) {
                    myContent.shorts.forEach(id => {
                        shortGrid.innerHTML += createVideoHTML(id);
                    });
                }
            } else {
                console.error("videos.js link nahi ho payi ya myContent variable nahi mila!");
            }
        };
    </script>
</body>
