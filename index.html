<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asif Tech Global | Professional LMS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="logo"><strong>ASIF TECH</strong> GLOBAL</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#courses">Courses</a>
            <a href="#videos">Videos</a>
        </div>
    </nav>

    <section class="hero" style="background: linear-gradient(135deg, #0033ad 0%, #001a57 100%); color: white; padding: 60px 20px; text-align: center;">
        <h1>Master Advanced Scripting & Tech</h1>
        <p>Expert Level Training for Next-Gen Developers</p>
    </section>

    <div class="container" style="max-width: 1200px; margin: auto; padding: 20px;">
        
        <div id="courses" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 40px 0;">
            <div style="background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05);"><i class="fas fa-graduation-cap" style="font-size: 30px; color: #0033ad;"></i><h3>All Courses</h3></div>
            <div style="background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05);"><i class="fas fa-book-open" style="font-size: 30px; color: #0033ad;"></i><h3>Extra Topics</h3></div>
            <div style="background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05);"><i class="fas fa-microchip" style="font-size: 30px; color: #0033ad;"></i><h3>Automation</h3></div>
        </div>

        <div id="videos" style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <h2 style="text-align: center; color: #0033ad;">Watch YouTube Videos</h2>
            
            <h3 style="border-left: 5px solid #0033ad; padding-left: 10px;">Latest Tutorials</h3>
            <div id="tutorial-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px;">
                </div>

            <h3 style="border-left: 5px solid #ff0000; padding-left: 10px;">Short Lessons</h3>
            <div id="shorts-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                </div>
        </div>
    </div>

    <script src="videos.js"></script>
    <script>
        function createVideoHTML(id) {
            return `
                <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; background:#000;">
                    <iframe src="https://www.youtube.com/embed/${id}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" allowfullscreen></iframe>
                </div>`;
        }

        window.onload = function() {
            if (typeof myContent !== 'undefined') {
                const tutGrid = document.getElementById('tutorial-grid');
                const shortGrid = document.getElementById('shorts-grid');

                if (tutGrid && myContent.tutorials) {
                    myContent.tutorials.forEach(id => { tutGrid.innerHTML += createVideoHTML(id); });
                }
                if (shortGrid && myContent.shorts) {
                    myContent.shorts.forEach(id => { shortGrid.innerHTML += createVideoHTML(id); });
                }
            }
        };
    </script>
</body>
</html>
