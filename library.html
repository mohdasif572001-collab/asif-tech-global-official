<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="ralf1YtAZz6KsemRlVFW78WlXmjkYWAGfqBSENFHG_4" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Library | Asif Tech Global</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 🎛️ Filter Buttons */
        .filter-menu { text-align: center; margin-bottom: 30px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .filter-btn { background: #f1f5f9; border: 2px solid transparent; color: #334155; padding: 10px 25px; border-radius: 50px; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .filter-btn.active { background: #00c853; color: white; border-color: #00c853; box-shadow: 0 6px 15px rgba(0, 200, 83, 0.3); }
        
        /* 💳 Payment Modal Styling */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 2% auto; padding: 25px; border-radius: 25px; width: 90%; max-width: 420px; text-align: center; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3); animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideDown { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #aaa; transition: 0.3s; }
        .close-btn:hover { color: #ff0000; }
        .qr-img { width: 180px; height: 180px; margin: 10px auto; border: 5px solid #f8f9fa; border-radius: 15px; display: block; object-fit: contain; }
        
        .whatsapp-btn { background: #25D366; color: white; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 14px; margin-top: 10px; transition: 0.3s; }
        .whatsapp-btn:hover { background: #128C7E; }

        #paypal-button-container { margin: 15px 0; min-height: 150px; }
        .divider { margin: 15px 0; border-top: 1px solid #eee; padding-top: 10px; font-size: 12px; color: #888; font-weight: bold; }

        .dark-theme .modal-content { background: #1e293b; color: #fff; }
    </style>
</head>
<body>

    <div id="master-menu-placeholder"></div>
    <script src="menu.js"></script>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle" style="color: #0033ad; margin-bottom: 5px;">Premium Resource</h3>
            <p style="color: #666; font-size: 14px;">Total Price: <strong>$<span id="modalPrice">0</span></strong></p>
            
            <div id="paypal-button-container"></div>

            <div class="divider">OR PAY VIA UPI (India Only)</div>
            
            <img src="files/images/my-qr.jpg" alt="Scan to Pay" class="qr-img" onerror="this.src='https://via.placeholder.com/180?text=Scan+QR+to+Pay'">
            
            <a id="whatsappLink" href="#" target="_blank" class="whatsapp-btn">
                <i class="fab fa-whatsapp"></i> WhatsApp Payment Screenshot
            </a>
            <p style="font-size: 11px; color: #999; margin-top: 8px;">After UPI, send screenshot to get the password.</p>
        </div>
    </div>

    <div class="container" style="max-width: 1200px; margin: auto; padding: 20px; margin-top: 20px;">
        <div id="downloads" style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-left: 5px solid #00c853;">
            <h2 style="text-align: center; color: #1b5e20; margin-bottom: 20px;"><i class="fas fa-folder-open"></i> Premium Resource Library</h2>
            
            <div class="filter-menu">
                <button class="filter-btn active" onclick="filterSelection('all', this)"><i class="fas fa-th-large"></i> All Files</button>
                <button class="filter-btn" onclick="filterSelection('images', this)"><i class="fas fa-images"></i> Photos</button>
                <button class="filter-btn" onclick="filterSelection('pdfs', this)"><i class="fas fa-file-pdf"></i> PDFs</button>
                <button class="filter-btn" onclick="filterSelection('ppts', this)"><i class="fas fa-file-powerpoint"></i> PPTs</button>
                <button class="filter-btn" onclick="filterSelection('codes', this)"><i class="fas fa-code"></i> Source Code</button>
                <button class="filter-btn" onclick="filterSelection('others', this)"><i class="fas fa-file-archive"></i> Others</button>
            </div>

            <div id="sec-codes" class="resource-section"><div id="code-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;"></div></div>
            <div id="sec-pdfs" class="resource-section"><div id="pdf-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;"></div></div>
            <div id="sec-ppts" class="resource-section"><div id="ppt-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;"></div></div>
            <div id="sec-images" class="resource-section"><div id="image-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;"></div></div>
            <div id="sec-others" class="resource-section"><div id="other-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;"></div></div>
        </div>
    </div>

    <script src="https://www.paypal.com/sdk/js?client-id=AVb5Zlx2r4O6qWQnHhIako_ObwZs0oEf3mBQDJ5WvGxc-RAeQtkUght4Ky5w0aMwJm7-22uzAxdvCi2T&currency=USD"></script>
    <script src="payment.js"></script>
    <script src="videos.js"></script>

    <script>
        const MY_WHATSAPP = "7983931678";

        function openPayment(title, price) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalPrice').innerText = price;
            document.getElementById('whatsappLink').href = `https://wa.me/${MY_WHATSAPP}?text=Hello Asif, I paid for ${title} via UPI. Here is the screenshot.`;
            document.getElementById('paymentModal').style.display = "block";
            
            // payment.js se PayPal button load karein
            if (typeof renderPayPal === "function") {
                renderPayPal(price, title);
            }
        }

        function closeModal() {
            document.getElementById('paymentModal').style.display = "none";
        }

        function filterSelection(category, btnElement) {
            var buttons = document.getElementsByClassName("filter-btn");
            for (var i = 0; i < buttons.length; i++) { buttons[i].classList.remove("active"); }
            btnElement.classList.add("active");
            var sections = ['codes', 'pdfs', 'ppts', 'images', 'others'];
            sections.forEach(sec => {
                var element = document.getElementById("sec-" + sec);
                if (element) element.style.display = (category === 'all' || category === sec) ? "block" : "none";
            });
        }

        window.onload = function() {
            if (typeof myContent !== 'undefined') {
                const grids = {
                    codes: { id: 'code-grid', color: '#00796b', icon: 'fa-code', btn: 'Source Code' },
                    pdfs: { id: 'pdf-grid', color: '#d32f2f', icon: 'fa-file-pdf', btn: 'View PDF' },
                    ppts: { id: 'ppt-grid', color: '#f57c00', icon: 'fa-file-powerpoint', btn: 'Download PPT' },
                    images: { id: 'image-grid', color: '#1976d2', icon: 'fa-image', btn: 'View Image' },
                    others: { id: 'other-grid', color: '#455a64', icon: 'fa-file-alt', btn: 'Download File' }
                };

                for (let type in grids) {
                    const grid = document.getElementById(grids[type].id);
                    if (grid && myContent[type]) {
                        myContent[type].forEach(item => {
                            const isPaid = item.isPaid === true;
                            const btnLabel = isPaid ? `<i class="fas fa-lock"></i> Unlock $${item.price}` : grids[type].btn;
                            const action = isPaid ? `onclick="openPayment('${item.title}', '${item.price}')"` : `href="${item.link}" target="_blank"`;
                            
                            grid.innerHTML += `
                                <div style="background: white; border: 1px solid #eee; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s;">
                                    <i class="fas ${grids[type].icon}" style="font-size: 35px; color: ${grids[type].color}; margin-bottom: 15px;"></i>
                                    <h4 style="margin: 5px 0 15px 0; color: #333; font-size: 14px;">${item.title}</h4>
                                    <a ${action} style="cursor:pointer; display: inline-block; background: ${isPaid ? '#003087' : grids[type].color}; color: white; padding: 6px 15px; border-radius: 5px; text-decoration: none; font-size: 12px; font-weight: bold;">${btnLabel}</a>
                                </div>`;
                        });
                    }
                }
            }
        };
    </script>
</body>
</html>
